
<div class="login-form">
  <h2>Giriş Yap</h2>
  <form #loginForm="ngForm" (ngSubmit)="login(email.value, password.value)">
    <label for="email">E-posta</label>
    <input id="email" name="email" type="email" #email required />
    <label for="password">Şifre</label>
    <input id="password" name="password" type="password" #password required />
    <button type="submit">Giriş Yap</button>
  </form>
  <div *ngIf="error()" class="error">{{ error() }}</div>
  <a routerLink="/reset-password">Şifremi Unuttum</a>
  <a routerLink="/register">Hesap Oluştur</a>
</div>
